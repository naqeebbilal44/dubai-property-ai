<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dubai Property AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Syne:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}"/>
</head>
<body>

  <div class="bg-effect"></div>

  <svg class="skyline-svg" viewBox="0 0 1440 220" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M0 220V160l20-10 10-40 10 40 5-20 5 20 20-80 5 30 5-30 15 60V70l5-50 5 50V50l5 30 5-50 5 30 5-70 3 40 3-40 5 60 5-30 5 50 10-40 10 40 20-100 5 60 5-60V80l10 40 5-20 5 20 30-60 5 30 5-30 20 50 5-20 5 20 10-30 5 10 5-10 20 40 10-20 10 40 20-60 5 30 5-30 15 50 5-20 5 20 10-30 10 60 20-80 3 40 3-40 5 60 5-30 5 50 20-40 20 40 10-20 10 30 30-50 5 20 5-20 20 40 10-10 10 10H1440V220z" fill="#C9A84C"/>
  </svg>

  <div class="page">

    <header>
      <div class="badge"><span></span>AI Property Advisor · Dubai</div>
      <h1>Find Your <em>Ideal</em><br/>Dubai Property</h1>
      <p>Describe your requirements and our AI will analyse the market, suggest the best areas, and estimate pricing for your dream home.</p>
    </header>

    <div class="card">
      <div class="card-title">Property Requirements</div>

      <div class="grid-2">
        <div class="field">
          <label>Location / Area in Dubai</label>
          <select id="location">
            <option value="">Select a community...</option>
            <option>Downtown Dubai</option>
            <option>Dubai Marina</option>
            <option>Palm Jumeirah</option>
            <option>Business Bay</option>
            <option>Jumeirah Village Circle (JVC)</option>
            <option>Dubai Hills Estate</option>
            <option>Arabian Ranches</option>
            <option>Jumeirah Lake Towers (JLT)</option>
            <option>Meydan / MBR City</option>
            <option>Dubai Creek Harbour</option>
            <option>Al Barsha</option>
            <option>Jumeirah</option>
            <option>Deira</option>
            <option>Silicon Oasis</option>
            <option>International City</option>
            <option>Other / Flexible</option>
          </select>
        </div>
        <div class="field">
          <label>Property Type</label>
          <select id="propType">
            <option value="">Select type...</option>
            <option>Apartment</option>
            <option>Villa</option>
            <option>Townhouse</option>
            <option>Penthouse</option>
            <option>Studio</option>
            <option>Duplex</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Number of Bedrooms (BHK)</label>
        <div class="bhk-group">
          <button type="button" class="bhk-btn" data-val="Studio">Studio</button>
          <button type="button" class="bhk-btn" data-val="1 BHK">1 BHK</button>
          <button type="button" class="bhk-btn" data-val="2 BHK">2 BHK</button>
          <button type="button" class="bhk-btn" data-val="3 BHK">3 BHK</button>
          <button type="button" class="bhk-btn" data-val="4 BHK">4 BHK</button>
          <button type="button" class="bhk-btn" data-val="5+ BHK">5+ BHK</button>
        </div>
      </div>

      <div class="grid-3">
        <div class="field">
          <label>Budget (AED)</label>
          <select id="budget">
            <option value="">Select range...</option>
            <option>Under 500,000</option>
            <option>500K – 1M</option>
            <option>1M – 2M</option>
            <option>2M – 4M</option>
            <option>4M – 8M</option>
            <option>8M – 15M</option>
            <option>15M+</option>
          </select>
        </div>
        <div class="field">
          <label>Purpose</label>
          <select id="purpose">
            <option value="">Select...</option>
            <option>Buy to Live</option>
            <option>Buy to Invest</option>
            <option>Rent</option>
            <option>Short-term Rental</option>
          </select>
        </div>
        <div class="field">
          <label>Furnishing</label>
          <select id="furnishing">
            <option value="">Select...</option>
            <option>Furnished</option>
            <option>Unfurnished</option>
            <option>Semi-furnished</option>
            <option>No Preference</option>
          </select>
        </div>
      </div>

      <div class="field">
        <label>Special Requirements / Notes</label>
        <textarea id="notes" placeholder="E.g. sea view, near metro, pet-friendly, school nearby, specific developer..."></textarea>
      </div>

      <button type="button" class="submit-btn" id="analyzeBtn">
        <span id="btnText">Analyse with AI</span>
        <div class="spinner" id="spinner"></div>
      </button>
      <div class="error-msg" id="errorMsg"></div>
    </div>

    <div class="result-card" id="resultCard">
      <div class="result-header">
        <div class="tag">✦ AI Property Analysis</div>
        <div class="result-meta" id="resultMeta"></div>
      </div>
      <div class="result-body" id="resultBody"></div>
    </div>

  </div>

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
